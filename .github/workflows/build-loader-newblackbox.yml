name: Build Loader with NewBlackbox AAR

on:
  push:
    branches:
      - main
      - master
      - work
  pull_request:
  workflow_dispatch:

jobs:
  build-loader:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "ndk;24.0.8215888" \
            "ndk;29.0.13846066"

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Build NewBlackbox Bcore AAR and Loader APKs
        run: scripts/build-loader-with-newblackbox-aar.sh

      - name: Upload NewBlackbox Bcore AAR
        uses: actions/upload-artifact@v4
        with:
          name: newblackbox-bcore-aar
          path: NewBlackbox/Bcore/build/outputs/aar/*release.aar
          if-no-files-found: error

      - name: Upload Loader APKs
        uses: actions/upload-artifact@v4
        with:
          name: loader-apks
          path: |
            LOADER/app/build/outputs/apk/debug/*.apk
            LOADER/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
